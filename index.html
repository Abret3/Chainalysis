<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Faqja Imė e Sigurt</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #121212;
    color: #fff;
  }
  /* Sidebar */
  .sidebar {
    width: 250px;
    background-color: #222;
    height: 100vh;
    position: fixed;
    padding-top: 20px;
  }
  .sidebar a {
    display: block;
    padding: 15px;
    color: #fff;
    text-decoration: none;
  }
  .sidebar a:hover {
    background-color: #333;
  }
  /* Main */
  .main {
    margin-left: 250px;
    padding: 20px;
  }
  /* Sekcionet */
  .section {
    display: none;
  }
  /* Sekcioni i hapur fillimisht */
  .section.active {
    display: block;
  }
  /* Forma e log-in */
  form {
    background-color: #1f1f1f;
    padding: 20px;
    border-radius: 8px;
    max-width: 300px;
  }
  input {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    margin-bottom: 16px;
    border: none;
    border-radius: 4px;
  }
  button {
    padding: 10px 20px;
    background-color: #007bff;
    border: none;
    border-radius: 4px;
    color: #fff;
    cursor: pointer;
  }
  button:hover {
    background-color: #0069d9;
  }
</style>
</head>
<body>

<div class="sidebar">
  <h2 style="color:#fff; padding: 0 20px;">Faqja Imė</h2>
  <a href="#dashboard" onclick="showSection('dashboard')">Dashboard</a>
  <a href="#assets" onclick="showSection('assets')">Assets</a>
  <a href="#settings" onclick="showSection('settings')">Settings</a>
  <a href="#login" onclick="showSection('login')">Log In</a>
  <a href="#logout" onclick="logout()">Log Out</a>
</div>

<div class="main">
  <!-- Sekcioni i Dashboard -->
  <div id="dashboard" class="section active">
    <h2>Dashboard</h2>
    <p>Ky ėshtė dashboard-i juaj i personalizuar.</p>
  </div>

  <!-- Sekcioni i Assets -->
  <div id="assets" class="section">
    <h2>Assets</h2>
    <ul>
      <li>Bitcoin: $0.00</li>
      <li>Ethereum: $0.00</li>
      <li>Solana: $0.00</li>
      <li>Tether: $0.00</li>
    </ul>
  </div>

  <!-- Sekcioni i Settings -->
  <div id="settings" class="section">
    <h2>Settings</h2>
    <p>Kėtu mund tė ndryshoni parametrat tuaj.</p>
  </div>

  <!-- Forma e Log-in -->
  <div id="login" class="section">
    <h2>Log In</h2>
    <form onsubmit="login(event)">
      <label for="username">Pėrdoruesi:</label>
      <input type="text" id="username" required />

      <label for="password">Fjalkalimi:</label>
      <input type="password" id="password" required />

      <button type="submit">Hyrja</button>
    </form>
    <p id="loginMessage" style="color:red; margin-top:10px;"></p>
  </div>
</div>

<script>
  // Funksioni pėr shfaqje tė seksioneve
  function showSection(sectionId) {
    const sections = document.querySelectorAll('.section');
    sections.forEach(sec => sec.classList.remove('active'));
    document.getElementById(sectionId).classList.add('active');
  }

  // Funksioni i hyrjes
  function login(e) {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    // Kredencialet e testit
    if (username === 'admin' && password === '123') {
      document.getElementById('loginMessage').innerText = '';
      alert('Hyrja e suksesshme!');
      showSection('dashboard');
    } else {
      document.getElementById('loginMessage').innerText = 'Pėrdoruesi ose fjalkalimi i gabuar!';
    }
  }

  // Funksioni i logout-it
  function logout() {
    alert('Jeni larguar!');
    showSection('login');
  }
</script>

</body>
</html>
